<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aussie Meme Boss Rush: VR Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: monospace; color: #0ff; }
        #debug-console { 
            position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); height: 100px; 
            background: rgba(0,0,0,0.8); font-size: 10px; overflow-y: auto; pointer-events: none; 
            z-index: 1000; border: 1px solid #0ff; display: block;
        }
        #error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20,0,0,0.9); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; padding: 20px; text-align: center;
        }
        #loading-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; z-index: 500;
        }
    </style>
</head>
<body>
    <div id="debug-console">DEBUG LOG START...<br></div>
    <div id="error-overlay">
        <h1>CRITICAL ERROR</h1>
        <div id="error-text"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#0ff; border:none; cursor:pointer;">RELOAD</button>
    </div>
    <div id="loading-msg">INITIALIZING SYSTEM...</div>

<script>
    const debugConsole = document.getElementById('debug-console');
    const errorOverlay = document.getElementById('error-overlay');
    const errorText = document.getElementById('error-text');
    const loadingMsg = document.getElementById('loading-msg');

    function log(msg) {
        console.log(msg);
        debugConsole.innerHTML += `> ${msg}<br>`;
        debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    window.onerror = function(msg, url, line) {
        const err = `${msg} at ${url}:${line}`;
        log(`ERROR: ${err}`);
        errorOverlay.style.display = 'flex';
        errorText.innerText = err;
        loadingMsg.style.display = 'none';
    };

    log("Page loaded. Checking browser features...");
    log(`WebXR: ${!!navigator.xr}`);
    log(`Secure Context: ${window.isSecureContext}`);
</script>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.149.0/build/three.module.js';
    import { VRButton } from 'https://unpkg.com/three@0.149.0/examples/jsm/webxr/VRButton.js';

    log("Three.js modules imported.");

    const width = window.innerWidth, height = window.innerHeight;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.Fog(0x020205, 10, 100);
    log("Scene and Fog created.");

    const camera = new THREE.PerspectiveCamera(70, width / height, 0.1, 1000);
    const cameraRig = new THREE.Group();
    cameraRig.position.set(0, 1.6, 0);
    cameraRig.add(camera);
    scene.add(cameraRig);
    log("Camera and Rig added at y=1.6.");

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(width, height);
    renderer.xr.enabled = true;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    
    try {
        const vrBtn = VRButton.createButton(renderer);
        document.body.appendChild(vrBtn);
        log("VRButton created.");
    } catch(e) {
        log("VRButton failed to initialize.");
    }

    // Lights
    const amb = new THREE.AmbientLight(0x404040, 0.5); scene.add(amb);
    const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(10, 20, 10); sun.castShadow = true; scene.add(sun);
    const bossSpot = new THREE.SpotLight(0xffffff, 3); bossSpot.position.set(0, 20, -5); bossSpot.castShadow = true; scene.add(bossSpot);
    log("Lights added.");

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    ground.rotation.x = -Math.PI/2; ground.position.y = 0; ground.receiveShadow = true; scene.add(ground);
    scene.add(new THREE.GridHelper(200, 40, 0x00ffff, 0x222222));
    log("Ground and Grid added.");

    // Game State
    let state = 'title', level = 0, pHP = 100, score = 0, mult = 1, boss = null, eHP = 0, eMax = 1, timeScale = 1, phase = 1;
    let entities = [], particles = [], ragdolls = [], env = [], activeUniforms = [];
    let playerName = "", shake = 0, flash = 0, scrollerText = "", scrollerCallback = null;
    const ctrl = { w: 'p', cd: 0, active: false, activeTimer: 0, wt: 0 };
    const KB_CHARS = "QWERTYUIOPASDFGHJKLZXCVBNM1234567890".split("");

    // Audio
    let audioCtx = null, isMusicOn = true, isSoundOn = true;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSfx(freq, type, duration, vol) {
        if (!isSoundOn || !audioCtx) return;
        try {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    const playShootSound = () => playSfx(440, 'square', 0.1, 0.05);
    const playHitSound = () => playSfx(150, 'sawtooth', 0.1, 0.05);
    const playClankSound = () => playSfx(800, 'square', 0.05, 0.1);
    const playExplosionSound = () => playSfx(100, 'sawtooth', 0.5, 0.15);
    const playPowerupSound = () => playSfx(880, 'sine', 0.3, 0.1);

    let musicIndex = 0;
    const bassline = [55, 55, 65, 41, 41, 41, 49, 49];
    function playMusicStep() {
        if (!isMusicOn || !audioCtx || state === 'paused' || state === 'scroller') return;
        try {
            const pitchScale = 1 + (level * 0.15);
            const freq = bassline[musicIndex % bassline.length] * pitchScale;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            musicIndex++;
        } catch(e) {}
    }
    setInterval(playMusicStep, 250);

    // Procedural Materials
    const noiseChunk = `vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}float snoise(vec2 v){const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1;i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);m=m*m;m=m*m;vec3 x=2.*fract(p*C.www)-1.;vec3 h=abs(x)-.5;vec3 ox=floor(x+.5);vec3 a0=x-ox;m*=1.79284291400159-.85373472095314*(a0*a0+h*h);vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.*dot(m,g);}`;
    function getProceduralMaterial(params) {
        const mat = new THREE.MeshStandardMaterial({ color: params.color, emissive: params.emissive || 0, roughness: 0.4, metalness: 0.3 });
        mat.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 }; activeUniforms.push(shader.uniforms);
            shader.vertexShader = `varying vec3 vCustomPos;\n` + shader.vertexShader.replace('#include <begin_vertex>', '#include <begin_vertex>\nvCustomPos = transformed;');
            shader.fragmentShader = `uniform float uTime; varying vec3 vCustomPos; \n ${noiseChunk} \n` + shader.fragmentShader;
            let effect = '';
            if (params.type === 'fur') effect = `float n = snoise(vCustomPos.xy * 0.8 + uTime * 0.5); diffuseColor.rgb *= (0.8 + 0.2 * n);`;
            else if (params.type === 'scales') effect = `float s = snoise(vec2(vCustomPos.x, vCustomPos.y - uTime * 2.0)); diffuseColor.rgb *= (0.9 + 0.3 * step(0.0, s));`;
            else if (params.type === 'tech') effect = `float sc = sin(vCustomPos.z * 3.0 + uTime * 8.0); diffuseColor.rgb += vec3(sc * 0.2);`;
            else if (params.type === 'vein') effect = `float v = pow(1.0 - abs(snoise(vCustomPos.xy * 0.4 + uTime * 0.3)), 5.0); diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0,1,1), v * 0.6);`;
            else if (params.type === 'plasma') effect = `float p = snoise(vCustomPos.xy * 0.2 - uTime) * snoise(vCustomPos.yz * 0.3); diffuseColor.rgb += vec3(1,0.4,0) * p;`;
            shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `#include <map_fragment>\n${effect}`);
        };
        return mat;
    }

    function applyShadows(obj) { obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } }); return obj; }

    // Boss Models
    function mkDropBear() {
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x666666, type: 'fur' });
        g.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 0.8, 4, 8), m));
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 8, 8), m); head.position.y = 0.7; head.name = "head"; g.add(head);
        const earG = new THREE.SphereGeometry(0.15, 4, 4);
        const lEar = new THREE.Mesh(earG, m); lEar.position.set(-0.35, 1.0, 0); g.add(lEar);
        const rEar = new THREE.Mesh(earG, m); rEar.position.set(0.35, 1.0, 0); g.add(rEar);
        const armG = new THREE.CapsuleGeometry(0.12, 0.4, 4, 4);
        const lArm = new THREE.Mesh(armG, m); lArm.position.set(-0.5, 0.2, 0.2); lArm.rotation.z = 0.5; g.add(lArm);
        const rArm = new THREE.Mesh(armG, m); rArm.position.set(0.5, 0.2, 0.2); rArm.rotation.z = -0.5; g.add(rArm);
        const eyeG = new THREE.BoxGeometry(0.1, 0.1, 0.1);
        const lEye = new THREE.Mesh(eyeG, new THREE.MeshStandardMaterial({emissive:0xff0000, emissiveIntensity:2})); lEye.position.set(-0.18, 0.8, 0.38); g.add(lEye);
        const rEye = new THREE.Mesh(eyeG, new THREE.MeshStandardMaterial({emissive:0xff0000, emissiveIntensity:2})); rEye.position.set(0.18, 0.8, 0.38); g.add(rEye);
        return applyShadows(g);
    }

    function mkEmu() {
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x553322, type: 'scales' });
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 8), m); body.scale.set(1, 0.8, 1.3); g.add(body);
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 1.2, 6), m); neck.position.set(0, 0.8, 0.6); neck.rotation.x = -0.3; g.add(neck);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), m); head.position.set(0, 1.4, 0.9); head.name = "head"; g.add(head);
        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 4), new THREE.MeshStandardMaterial({color:0x996633})); beak.position.set(0, 1.4, 1.2); beak.rotation.x = Math.PI/2; g.add(beak);
        const legG = new THREE.CylinderGeometry(0.05, 0.05, 1.0, 4);
        const lLeg = new THREE.Mesh(legG, m); lLeg.position.set(-0.3, -0.8, 0); g.add(lLeg);
        const rLeg = new THREE.Mesh(legG, m); rLeg.position.set(0.3, -0.8, 0); g.add(rLeg);
        return applyShadows(g);
    }

    function mkMagpie() {
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x111111, type: 'tech' });
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 4, 8), m); body.rotation.x = Math.PI/2; g.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), m); head.position.z = 0.6; head.name = "head"; g.add(head);
        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.3, 4), new THREE.MeshStandardMaterial({color:0x333333})); beak.position.set(0, 0, 0.85); beak.rotation.x = Math.PI/2; g.add(beak);
        const wingG = new THREE.BoxGeometry(1.2, 0.02, 0.6);
        const lWing = new THREE.Mesh(wingG, new THREE.MeshStandardMaterial({color:0xffffff})); lWing.position.set(-0.7, 0, 0); lWing.rotation.y = 0.2; g.add(lWing);
        const rWing = new THREE.Mesh(wingG, new THREE.MeshStandardMaterial({color:0xffffff})); rWing.position.set(0.7, 0, 0); rWing.rotation.y = -0.2; g.add(rWing);
        const tail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.02, 0.6), m); tail.position.z = -0.6; g.add(tail);
        return applyShadows(g);
    }

    function mkSpider() {
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x221133, type: 'vein' });
        const b1 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), m); b1.position.z = 0.3; b1.name = "head"; g.add(b1);
        const b2 = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8), m); b2.position.z = -0.4; b2.scale.set(1, 0.8, 1.2); g.add(b2);
        for(let i=0; i<8; i++){
            const l = new THREE.Group();
            const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.8), m); s1.position.z = 0.4; l.add(s1);
            const s2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 1.0), new THREE.MeshStandardMaterial({emissive:0x00ffff})); s2.position.set(0, -0.4, 1.0); s2.rotation.x = Math.PI/3; l.add(s2);
            l.rotation.y = (i/8)*Math.PI*2; l.position.y = 0.2; g.add(l);
        }
        return applyShadows(g);
    }

    function mkKangaroo() {
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x884422, type: 'plasma' });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 1.2, 8), m); g.add(body);
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 0.6, 6), m); neck.position.set(0, 0.8, 0.2); neck.rotation.x = -0.4; g.add(neck);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.5), m); head.position.set(0, 1.1, 0.4); head.name = "head"; g.add(head);
        const tail = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 1.2, 4, 4), m); tail.position.set(0, -0.4, -0.6); tail.rotation.x = -Math.PI/4; g.add(tail);
        const legG = new THREE.CapsuleGeometry(0.2, 0.6, 4, 4);
        const lLeg = new THREE.Mesh(legG, m); lLeg.position.set(-0.5, -0.6, 0); g.add(lLeg);
        const rLeg = new THREE.Mesh(legG, m); rLeg.position.set(0.5, -0.6, 0); g.add(rLeg);
        const gloveG = new THREE.SphereGeometry(0.25, 8, 8);
        const lGlove = new THREE.Mesh(gloveG, new THREE.MeshStandardMaterial({color:0xff0000})); lGlove.position.set(-0.4, 0.4, 0.6); g.add(lGlove);
        const rGlove = new THREE.Mesh(gloveG, new THREE.MeshStandardMaterial({color:0xff0000})); rGlove.position.set(0.4, 0.4, 0.6); g.add(rGlove);
        return applyShadows(g);
    }

    const LVLS = [
        { n: "DROP BEAR", hp: 1000, create: mkDropBear, mkEnv: mkForest, bg: 0x050a05, story: "MISSION 1: THE HANGING TERROR\nDeep in the neon forest, a predator waits.\nStay alert. They come from above." },
        { n: "CYBER EMU", hp: 1500, create: mkEmu, mkEnv: mkDesert, bg: 0x0a0500, story: "MISSION 2: SPEED DEMON\nThe Great Emu War has evolved.\nFaster. Stronger. More feathers." },
        { n: "MAGPIE DRONE", hp: 2000, create: mkMagpie, mkEnv: mkSuburbs, bg: 0x05050a, story: "MISSION 3: SWOOP SEASON\nEyes in the back of your head won't save you.\nThe suburbs are no longer safe." },
        { n: "CYBER HUNTSMAN", hp: 2500, create: mkSpider, mkEnv: mkShed, bg: 0x0a000a, story: "MISSION 4: EIGHT-LEGGED FURY\nCaught in a web of lies and lasers.\nDon't let it get close." },
        { n: "K-9000 ROO", hp: 4000, create: mkKangaroo, mkEnv: mkOutback, bg: 0x0a0a00, story: "FINAL MISSION: THE BIG RED\nThe ultimate boxing champion.\nThis is for the championship belt." }
    ];

    function mkForest() { for(let i=0; i<40; i++) { const tree = new THREE.Group(); tree.add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.0, 0.2), new THREE.MeshStandardMaterial({color:0x442211}))); const f = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 6), new THREE.MeshStandardMaterial({color:0x114411})); f.position.y = 1.0; tree.add(f); tree.position.set((Math.random()-0.5)*20, 0, -10 - Math.random()*20); scene.add(tree); env.push(applyShadows(tree)); } }
    function mkDesert() { for(let i=0; i<30; i++) { const r = new THREE.Mesh(new THREE.DodecahedronGeometry(0.5 + Math.random()*1.0, 0), new THREE.MeshStandardMaterial({color:0x884422})); r.position.set((Math.random()-0.5)*20, 0, -10 - Math.random()*20); r.rotation.set(Math.random(), Math.random(), Math.random()); scene.add(r); env.push(applyShadows(r)); } }
    function mkSuburbs() { for(let i=0; i<15; i++) { const h = new THREE.Group(); h.add(new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.5), new THREE.MeshStandardMaterial({color:0xeeeeee}))); const r = new THREE.Mesh(new THREE.ConeGeometry(1.2, 0.8, 4), new THREE.MeshStandardMaterial({color:0xaa2222})); r.position.y = 1.0; h.add(r); h.position.set((Math.random()-0.5)*20, 0, -10 - Math.random()*20); scene.add(h); env.push(applyShadows(h)); } }
    function mkShed() { for(let i=0; i<10; i++) { const b = new THREE.Mesh(new THREE.BoxGeometry(20, 0.2, 0.2), new THREE.MeshStandardMaterial({color:0x333333})); b.position.set(0, 3, -5 - i*2); scene.add(b); env.push(applyShadows(b)); } }
    function mkOutback() { mkDesert(); for(let i=0; i<15; i++) { const f = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshStandardMaterial({color:0x332211})); f.position.set((Math.random()-0.5)*20, 0, -10 - Math.random()*20); scene.add(f); env.push(applyShadows(f)); } }

    // HUD
    const hudCanvas = document.createElement('canvas');
    hudCanvas.width = 512; hudCanvas.height = 256;
    const hudCtx = hudCanvas.getContext('2d');
    const hudTex = new THREE.CanvasTexture(hudCanvas);
    const hudMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.4), new THREE.MeshBasicMaterial({ map: hudTex, transparent: true }));
    hudMesh.position.set(0, 0.4, -1);
    camera.add(hudMesh);

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' '), lines = []; let line = '';
        words.forEach(w => {
            const test = line + w + ' ';
            if (ctx.measureText(test).width > maxWidth && line !== '') { lines.push(line); line = w + ' '; }
            else line = test;
        });
        lines.push(line);
        lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
    }

    function updateHUD() {
        hudCtx.clearRect(0, 0, 512, 256);
        hudCtx.fillStyle = "rgba(0,0,0,0.8)";
        hudCtx.fillRect(0, 0, 512, 256);
        hudCtx.strokeStyle = "#0ff";
        hudCtx.lineWidth = 4;
        hudCtx.strokeRect(0, 0, 512, 256);
        hudCtx.fillStyle = "#fff";
        hudCtx.font = "bold 24px Arial";
        hudCtx.textAlign = "center";
        
        if(state === 'title') {
            hudCtx.fillStyle = "#0ff"; hudCtx.font = "bold 32px Arial";
            hudCtx.fillText("NEON BOSS RUSH VR", 256, 60);
            hudCtx.fillStyle = "#fff"; hudCtx.font = "20px Arial";
            hudCtx.fillText("PULL TRIGGER TO START", 256, 120);
            hudCtx.fillText("SQUEEZE FOR SHIELD", 256, 160);
            hudCtx.fillStyle = "#f0f"; hudCtx.font = "16px Arial";
            hudCtx.fillText("TOP OPERATORS", 256, 210);
        } else if(state === 'leaderboard') {
            hudCtx.fillStyle = "#0ff"; hudCtx.fillText("TOP OPERATORS", 256, 40);
            hudCtx.font = "16px Arial"; hudCtx.textAlign = "left";
            let lb = JSON.parse(localStorage.getItem('aussie_lb') || '[]');
            lb.slice(0, 5).forEach((e, i) => {
                hudCtx.fillStyle = (i === 0) ? "#ff0" : "#fff";
                hudCtx.fillText(`${i+1}. ${e.name}`, 100, 70 + i * 25);
                hudCtx.fillText(`${e.score}`, 350, 70 + i * 25);
            });
            hudCtx.textAlign = "center"; hudCtx.fillStyle = "#0ff";
            hudCtx.fillText("TRIGGER TO RETURN", 256, 220);
        } else if(state === 'story') {
            hudCtx.font = "18px Arial";
            wrapText(hudCtx, LVLS[level].story, 256, 80, 400, 25);
        } else if(state === 'scroller') {
            hudCtx.font = "16px Arial";
            wrapText(hudCtx, scrollerText, 256, 40, 420, 22);
        } else if(state === 'intro') {
            hudCtx.fillStyle = "#f04"; hudCtx.font = "bold 36px Arial";
            hudCtx.fillText("WARNING", 256, 100);
            hudCtx.fillText(LVLS[level].n, 256, 160);
        } else if(state === 'fight') {
            hudCtx.fillStyle = "#fff"; hudCtx.font = "bold 36px Arial";
            hudCtx.fillText("FIGHT!", 256, 130);
        } else if(state === 'input') {
            hudCtx.fillStyle = "#0ff"; hudCtx.fillText("MISSION DEBRIEF", 256, 50);
            hudCtx.fillStyle = "#fff"; hudCtx.font = "20px Arial";
            hudCtx.fillText(`FINAL SCORE: ${score}`, 256, 90);
            hudCtx.fillText("ENTER INITIALS", 256, 130);
            hudCtx.font = "bold 40px Arial";
            hudCtx.fillText(playerName.padEnd(3, "_"), 256, 180);
            hudCtx.font = "14px Arial";
            hudCtx.fillText("USE VIRTUAL KEYS TO ENTER", 256, 220);
        } else if(state === 'playing') {
            hudCtx.textAlign = "left"; hudCtx.font = "bold 20px Arial";
            hudCtx.fillText(`LVL: ${level+1}`, 30, 40);
            hudCtx.textAlign = "right";
            hudCtx.fillText(`SCORE: ${score}`, 482, 40);
            hudCtx.textAlign = "center";
            hudCtx.fillStyle = mult > 1 ? "#0ff" : "#fff";
            hudCtx.fillText(`X${mult}`, 256, 40);
            
            hudCtx.textAlign = "left"; hudCtx.fillStyle = "#0f6";
            hudCtx.fillText(`HP: ${Math.floor(pHP)}`, 30, 220);
            
            hudCtx.textAlign = "right";
            if(ctrl.active) { hudCtx.fillStyle = "#fff"; hudCtx.fillText("SHIELD: ACTIVE", 482, 220); }
            else if(ctrl.cd > 0) { hudCtx.fillStyle = "#f55"; hudCtx.fillText(`SHIELD: ${Math.ceil(ctrl.cd/60)}s`, 482, 220); }
            else { hudCtx.fillStyle = "#0ff"; hudCtx.fillText("SHIELD: READY", 482, 220); }

            if(boss) {
                hudCtx.fillStyle = "#333"; hudCtx.fillRect(106, 200, 300, 15);
                hudCtx.fillStyle = "#0ff"; hudCtx.fillRect(106, 200, 300 * (Math.max(0, eHP)/eMax), 15);
                hudCtx.strokeStyle = "#fff"; hudCtx.lineWidth = 2; hudCtx.strokeRect(106, 200, 300, 15);
                hudCtx.font = "12px Arial"; hudCtx.fillStyle = "#fff";
                hudCtx.fillText(LVLS[level].n, 256, 195);
            }
        }
        hudTex.needsUpdate = true;
    }

    // VR Controllers
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();
    const controllers = [];

    function onSelectStart(event) {
        initAudio();
        const controller = event.target;
        if(state === 'playing') fire(controller);
        else if(state === 'title') {
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            const intersects = raycaster.intersectObject(hudMesh);
            if (intersects.length > 0 && intersects[0].uv.y < 0.3) { state = 'leaderboard'; }
            else { startGame(); }
        }
        else if(state === 'leaderboard') state = 'title';
        else if(state === 'story' || state === 'scroller') {
            if(state === 'scroller' && scrollerCallback) scrollerCallback();
            else startLevel();
        }
        else if(state === 'input') {
            if (playerName.length < 3) playerName += KB_CHARS[Math.floor(Math.random()*KB_CHARS.length)];
            else {
                let lb = JSON.parse(localStorage.getItem('aussie_lb') || '[]');
                lb.push({ name: playerName, score });
                lb.sort((a, b) => b.score - a.score);
                localStorage.setItem('aussie_lb', JSON.stringify(lb.slice(0, 10)));
                state = 'leaderboard';
            }
        }
    }

    function onSqueezeStart() {
        if(state === 'playing') activateShield();
    }

    for (let i = 0; i < 2; i++) {
        const controller = renderer.xr.getController(i);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('squeezestart', onSqueezeStart);
        scene.add(controller);
        controllers.push(controller);

        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]), new THREE.LineBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.5}));
        line.scale.z = 10;
        controller.add(line);
    }

    // Shield
    const shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2, side: THREE.BackSide }));
    shieldMesh.visible = false;
    cameraRig.add(shieldMesh);

    function activateShield() {
        if(ctrl.cd <= 0 && !ctrl.active) {
            ctrl.active = true;
            ctrl.activeTimer = 120;
            shieldMesh.visible = true;
            playSfx(200, 'sine', 0.2, 0.1);
        }
    }

    function fire(controller) {
        playShootSound();
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

        const targets = [];
        if(boss) boss.traverse(c => { if(c.isMesh) targets.push(c); });
        entities.forEach(e => targets.push(e.mesh));

        const intersects = raycaster.intersectObjects(targets);
        let hit = false, point = raycaster.ray.at(20, new THREE.Vector3());
        const dmg = ctrl.w === 'h' ? 50 : 25;

        if (intersects.length > 0) {
            const hitObj = intersects[0].object;
            point = intersects[0].point;
            if(hitObj.isArmor) {
                playClankSound();
                spawnP(point, 10, 0xffffff);
                mult = 1;
            } else {
                let isBossPart = false;
                if(boss) boss.traverse(c => { if(c === hitObj) isBossPart = true; });
                if(isBossPart) {
                    eHP -= dmg; mult = Math.min(16, mult * 2); score += 100 * mult;
                    playHitSound(); flash = 5;
                    spawnP(point, 20, 0xffff00);
                } else {
                    const ent = entities.find(e => e.mesh === hitObj);
                    if(ent) {
                        ent.dead = true;
                        if(ent.type === 'prj') { score += 200; spawnP(point, 12, 0xff00ff); playHitSound(); }
                        else { 
                            if(ent.k === 'hp') pHP = Math.min(100, pHP + 45); 
                            else { ctrl.w = 'h'; ctrl.wt = 400; }
                            score += 500; playPowerupSound(); spawnP(point, 20, 0x00ffff);
                        }
                    }
                }
            }
            hit = true;
        } else {
            mult = 1;
        }

        const beamG = new THREE.CylinderGeometry(0.01, 0.01, raycaster.ray.origin.distanceTo(point), 4);
        const beamM = new THREE.MeshBasicMaterial({color: ctrl.w === 'h' ? 0x00ffff : 0x00ff00, transparent: true, opacity: 0.4});
        const beam = new THREE.Mesh(beamG, beamM);
        beam.position.copy(raycaster.ray.origin.clone().lerp(point, 0.5));
        beam.lookAt(point); beam.rotateX(Math.PI/2);
        scene.add(beam);
        setTimeout(() => scene.remove(beam), 50);
    }

    function spawnP(pos, n, col) {
        for(let i=0; i<n; i++) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,0.05), new THREE.MeshBasicMaterial({ color: col }));
            m.position.copy(pos); scene.add(m);
            particles.push({ m, v: new THREE.Vector3((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2), life: 20 });
        }
    }

    function showScroller(text, callback) {
        state = 'scroller'; scrollerText = text; scrollerCallback = callback;
    }

    function startGame() { 
        level = 0; pHP = 100; score = 0; mult = 1; initAudio();
        const introText = "A long time ago in an Outback far, far away...\n\nTHE NEON REBELLION\n\nThe Great Emu War has moved into the digital realm.\n\nAs the last Cyber-Operator, you must delete the Big Five before they upload 'Bogans.exe'.\n\nYour journey begins in the Neon Forest...";
        showScroller(introText, startLevel);
    }

    function startLevel() {
        phase = 1;
        if(boss) scene.remove(boss); entities.forEach(e=>scene.remove(e.mesh)); entities=[]; env.forEach(e=>scene.remove(e)); env=[]; particles.forEach(p=>scene.remove(p.m)); particles=[]; ragdolls.forEach(r=>scene.remove(r.mesh)); ragdolls=[];
        const l = LVLS[level]; eHP = l.hp; eMax = eHP; boss = l.create(); boss.position.set(0, 1.5, -8); scene.add(boss);
        l.mkEnv(); scene.background = new THREE.Color(l.bg); scene.fog.color = new THREE.Color(l.bg);
        
        state = 'story';
        setTimeout(() => { if(state === 'story') { state = 'intro'; playExplosionSound(); } }, 4000);
        setTimeout(() => { if(state === 'intro') { state = 'fight'; } }, 6000);
        setTimeout(() => { if(state === 'fight') { state = 'playing'; } }, 7500);
    }

    function update() {
        const now = Date.now();
        const t = now * 0.001;
        activeUniforms.forEach(u => { if(u.uTime) u.uTime.value = t; });

        if(state === 'playing') {
            if(boss) {
                boss.position.x = Math.sin(t * 0.8) * 4;
                boss.position.y = 1.5 + Math.cos(t * 0.4) * 0.8;
                boss.rotation.y = Math.PI + Math.sin(t * 0.2);
                
                if(flash > 0) {
                    boss.traverse(c => { if(c.isMesh) c.material.emissiveIntensity = 5; }); flash--;
                } else {
                    boss.traverse(c => { if(c.isMesh) c.material.emissiveIntensity = 1; });
                }

                if(phase === 1 && eHP <= eMax / 3) {
                    phase = 2; playExplosionSound();
                    const armorMat = new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 1.0, roughness: 0.0, emissive: 0xffffff, emissiveIntensity: 0.5});
                    boss.traverse(c => { 
                        if(c.isMesh && !c.name.toLowerCase().includes('head') && Math.random() > 0.5) {
                            c.material = armorMat; c.isArmor = true;
                        }
                    });
                }

                if(Math.random() < 0.02) {
                    const pr = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15, 0), new THREE.MeshStandardMaterial({emissive: 0xff00ff, emissiveIntensity: 2}));
                    pr.position.copy(boss.position);
                    scene.add(pr);
                    const target = new THREE.Vector3(); camera.getWorldPosition(target);
                    entities.push({ mesh: pr, type: 'prj', v: new THREE.Vector3().subVectors(target, boss.position).normalize().multiplyScalar(0.15) });
                }
                if(Math.random() < 0.005) {
                    const k = Math.random() > 0.6 ? 'hp' : 'w';
                    const pw = new THREE.Mesh(new THREE.OctahedronGeometry(0.2), new THREE.MeshStandardMaterial({emissive: k==='hp'?0x00ff00:0x00ffff}));
                    pw.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*5 + 1.5, -6);
                    scene.add(pw);
                    entities.push({ mesh: pw, type: 'pwr', k, life: 240, v: new THREE.Vector3(0,0,0) });
                }
            }

            if(eHP <= 0) {
                state = 'complete'; timeScale = 0.2; playExplosionSound();
                const pieces = []; boss.traverse(c => { if(c.isMesh) pieces.push(c); });
                pieces.forEach(p => {
                    const wp = new THREE.Vector3(), wq = new THREE.Quaternion(); p.getWorldPosition(wp); p.getWorldQuaternion(wq);
                    scene.add(p); p.position.copy(wp); p.quaternion.copy(wq); p.scale.set(0.1,0.1,0.1);
                    ragdolls.push({ mesh: p, v: new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2), rv: new THREE.Vector3(Math.random()*0.1, Math.random()*0.1, Math.random()*0.1) });
                });
                scene.remove(boss); boss = null;
                setTimeout(() => {
                    playExplosionSound();
                    ragdolls.forEach(r => { 
                        for(let i=0; i<10; i++) spawnP(r.mesh.position, 1, 0xffffff * Math.random());
                        scene.remove(r.mesh); 
                    });
                    ragdolls = []; timeScale = 1.0;
                    if(level < LVLS.length - 1) { level++; startLevel(); }
                    else {
                        const outroText = "MISSION ACCOMPLISHED\n\nThe Big Five have been deleted.\n\nFINAL SCORE: " + score + "\n\nTRIGGER to debrief.";
                        showScroller(outroText, () => { state = 'input'; playerName = ""; });
                    }
                }, 2500);
            }
            if(pHP <= 0) { state = 'input'; playerName = ""; }

            if(ctrl.active) {
                ctrl.activeTimer--;
                if(ctrl.activeTimer <= 0) { ctrl.active = false; ctrl.cd = 120; shieldMesh.visible = false; }
            } else if(ctrl.cd > 0) {
                ctrl.cd--;
            }
            if(ctrl.wt > 0) { ctrl.wt--; if(ctrl.wt <= 0) ctrl.w = 'p'; }
        }

        ragdolls.forEach(r => {
            r.v.y -= 0.005 * timeScale; r.mesh.position.add(r.v.clone().multiplyScalar(timeScale));
            r.mesh.rotation.x += r.rv.x * timeScale; r.mesh.rotation.y += r.rv.y * timeScale;
            if (r.mesh.position.y < 0) { r.mesh.position.y = 0; r.v.y *= -0.5; }
        });

        const camWorldPos = new THREE.Vector3();
        camera.getWorldPosition(camWorldPos);

        for(let i=entities.length-1; i>=0; i--){
            const e = entities[i]; e.mesh.position.add(e.v);
            if(e.type === 'pwr') { e.mesh.rotation.y += 0.05; e.life--; if(e.life <= 0) e.dead = true; }
            if(e.mesh.position.distanceTo(camWorldPos) < 0.5) {
                if(e.type === 'prj') {
                    if(!ctrl.active && state === 'playing') { pHP -= 10; playHitSound(); mult = 1; }
                } else if(e.type === 'pwr') {
                    if(e.k === 'hp') pHP = Math.min(100, pHP + 45); 
                    else { ctrl.w = 'h'; ctrl.wt = 400; }
                    playPowerupSound();
                }
                e.dead = true;
            }
            if(e.dead || e.mesh.position.z > 5) { scene.remove(e.mesh); entities.splice(i, 1); }
        }

        for(let i=particles.length-1; i>=0; i--){
            const p = particles[i]; p.m.position.add(p.v); p.life--; 
            if(p.life <= 0) { scene.remove(p.m); particles.splice(i,1); }
        }
        updateHUD();
        renderer.render(scene, camera);
    }

    log("Initializing animation loop...");
    loadingMsg.style.display = 'none';
    renderer.setAnimationLoop(update);
    log("Animation loop started.");

    // Simple Test
    setTimeout(() => {
        if (renderer.info.render.calls > 0) {
            log("TEST PASSED: Renderer is active.");
        } else {
            log("TEST FAILED: Renderer is not drawing.");
        }
    }, 1000);
</script>
</body>
</html>
