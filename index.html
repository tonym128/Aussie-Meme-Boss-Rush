<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aussie Meme Boss Rush: 3D Story Deluxe</title>
<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    :root { --vh: 100vh; }
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; height: 100vh; height: calc(var(--vh, 1vh) * 100); width: 100vw; touch-action: none; }
    #game-container { position: relative; width: 100vw; height: 100vh; height: calc(var(--vh, 1vh) * 100); background: #000; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; display: block; width: 100%; height: 100%; }
    #uiCanvas { z-index: 2; pointer-events: none; }
    #screen-msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10; text-align: center; }
    .btn { margin-top: 20px; padding: 15px 30px; background: #0ff; color: #000; border: none; font-family: 'Press Start 2P', cursive; cursor: pointer; font-size: 16px; box-shadow: 4px 4px #f0f; transition: all 0.1s; pointer-events: auto; }
    .btn:hover { background: #fff; transform: scale(1.05); }
    #shield-btn { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; border-radius: 50%; background: rgba(0,255,255,0.1); border: none; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 10px; z-index: 20; display: none; align-items: center; justify-content: center; pointer-events: auto; user-select: none; -webkit-tap-highlight-color: transparent; }
    #info-overlay { position:absolute; bottom:20px; left:20px; font-size:10px; color:#aaa; z-index:5; text-align:left; pointer-events:none; line-height:1.5; display:none; }
    #fs-toggle { position: absolute; top: 20px; left: 20px; padding: 10px; background: rgba(0,255,255,0.1); border: 1px solid #0ff; color: #0ff; font-family: 'Press Start 2P', cursive; font-size: 8px; z-index: 30; cursor: pointer; display: none; }
    .letterbox { position:absolute; left:0; width:100%; height:80px; background:#000; z-index:15; transition: transform 0.5s; }
    #lb-top { top:0; transform: translateY(-100%); }
    #lb-bot { bottom:0; transform: translateY(100%); }
    .cinematic #lb-top, .cinematic #lb-bot { transform: translateY(0); }
    #scroller-container { position: absolute; width: 100%; height: 100%; display: none; perspective: 600px; overflow: hidden; background: #000; z-index: 50; }
    #scroller-container::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(to bottom, #000 20%, transparent 100%); pointer-events: none; }
    #scroller-content { position: absolute; width: 70%; left: 15%; color: #ff0; font-family: 'Press Start 2P', cursive; text-align: center; transform: rotateX(20deg); top: 100%; transition: none; line-height: 2.2; white-space: pre-wrap; transform-origin: 50% 0%; font-size: clamp(8px, 2.5vw, 14px); overflow-wrap: break-word; }
    .scroll-anim { animation: scrollMove 25s linear forwards; }
    @keyframes scrollMove {
        0% { top: 100%; }
        100% { top: -100%; }
    }
    #skip-btn { position: absolute; bottom: 30px; right: 30px; z-index: 60; display: none; background: rgba(255,255,0,0.2); border: 1px solid #ff0; color: #ff0; }
</style>
</head>
<body>

<div id="game-container">
    <div id="lb-top" class="letterbox"></div>
    <div id="lb-bot" class="letterbox"></div>
    <div id="three-container" style="width:100%; height:100%; z-index:1; position:absolute; top:0; left:0;"></div>
    <canvas id="uiCanvas" style="pointer-events: auto;"></canvas>
    <div id="info-overlay">AIM: TOUCH/MOUSE | SHIELD: BUTTON/R-CLICK</div>
    <div id="shield-btn"></div>
    <div id="fs-toggle">FULLSCREEN</div>
    <div id="scroller-container">
        <div id="scroller-content"></div>
        <button class="btn" id="skip-btn">SKIP</button>
    </div>
    <div id="screen-msg"></div>
</div>

<script>
    let width = window.innerWidth, height = window.innerHeight;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.Fog(0x020205, 40, 150);

    const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
    camera.position.z = 50;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('three-container').appendChild(renderer.domElement);

    const amb = new THREE.AmbientLight(0x404040, 0.3); scene.add(amb);
    const hemi = new THREE.HemisphereLight(0x00ffff, 0xff00ff, 0.4); scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(20, 40, 10); sun.castShadow = true; scene.add(sun);
    const bossSpot = new THREE.SpotLight(0xffffff, 2.5); bossSpot.position.set(0, 60, 0); bossSpot.angle = Math.PI/4; bossSpot.penumbra = 0.3; bossSpot.castShadow = true; scene.add(bossSpot);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })); ground.rotation.x = -Math.PI/2; ground.position.y = -15; ground.receiveShadow = true; scene.add(ground);
    const grid = new THREE.GridHelper(1000, 50, 0x00ffff, 0x222222); grid.position.y = -14.9; grid.material.opacity = 0.2; grid.material.transparent = true; scene.add(grid);

    const activeUniforms = [];
    let state = 'title', prevState = 'playing', level = 0, pHP = 100, score = 0, mult = 1, boss = null, eHP = 0, eMax = 1, timeScale = 1, phase = 1;
    let entities = [], env = [], particles = [], ragdolls = [], flash = 0, shake = 0, playerName = "";
    let isFiring = false, lastFireTime = 0;
    let audioCtx = null, musicOsc = null, musicGain = null, isMusicOn = true, isSoundOn = true;
    const camTargetPos = new THREE.Vector3(0, 0, 50);
    const mouse = new THREE.Vector2(), ray = new THREE.Raycaster();
    const uiCanvas = document.getElementById('uiCanvas'), uiCtx = uiCanvas.getContext('2d');
    const ctrl = { w: 'p', wt: 0, cd: 0, active: false, activeTimer: 0 };
    const KB_CHARS = "QWERTYUIOPASDFGHJKLZXCVBNM1234567890".split("");

    const noiseChunk = `vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}float snoise(vec2 v){const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1;i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);m=m*m;m=m*m;vec3 x=2.*fract(p*C.www)-1.;vec3 h=abs(x)-.5;vec3 ox=floor(x+.5);vec3 a0=x-ox;m*=1.79284291400159-.85373472095314*(a0*a0+h*h);vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.*dot(m,g);}`;

    function getProceduralMaterial(params) {
        const mat = new THREE.MeshStandardMaterial({ color: params.color, emissive: params.emissive || 0, roughness: 0.4, metalness: 0.3 });
        mat.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 }; activeUniforms.push(shader.uniforms);
            shader.vertexShader = `varying vec3 vCustomPos;\n` + shader.vertexShader.replace('#include <begin_vertex>', '#include <begin_vertex>\nvCustomPos = transformed;');
            shader.fragmentShader = `uniform float uTime; varying vec3 vCustomPos; \n ${noiseChunk} \n` + shader.fragmentShader;
            let effect = '';
            if (params.type === 'fur') effect = `float n = snoise(vCustomPos.xy * 0.8 + uTime * 0.5); diffuseColor.rgb *= (0.8 + 0.2 * n);`;
            else if (params.type === 'scales') effect = `float s = snoise(vec2(vCustomPos.x, vCustomPos.y - uTime * 2.0)); diffuseColor.rgb *= (0.9 + 0.3 * step(0.0, s));`;
            else if (params.type === 'tech') effect = `float sc = sin(vCustomPos.z * 3.0 + uTime * 8.0); diffuseColor.rgb += vec3(sc * 0.2);`;
            else if (params.type === 'vein') effect = `float v = pow(1.0 - abs(snoise(vCustomPos.xy * 0.4 + uTime * 0.3)), 5.0); diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0,1,1), v * 0.6);`;
            else if (params.type === 'plasma') effect = `float p = snoise(vCustomPos.xy * 0.2 - uTime) * snoise(vCustomPos.yz * 0.3); diffuseColor.rgb += vec3(1,0.4,0) * p;`;
            shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `#include <map_fragment>\n${effect}`);
        };
        return mat;
    }

    function applyShadows(obj) { obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } }); return obj; }

    function mkDropBear() { 
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x666666, type: 'fur' }); 
        g.add(new THREE.Mesh(new THREE.CapsuleGeometry(5, 8, 4, 8), m)); // Body
        const head = new THREE.Mesh(new THREE.SphereGeometry(4.5, 8, 8), m); head.position.y = 7; head.name = "head"; g.add(head);
        const earG = new THREE.SphereGeometry(1.5, 4, 4);
        const lEar = new THREE.Mesh(earG, m); lEar.position.set(-3.5, 10, 0); g.add(lEar);
        const rEar = new THREE.Mesh(earG, m); rEar.position.set(3.5, 10, 0); g.add(rEar);
        const armG = new THREE.CapsuleGeometry(1.2, 4, 4, 4);
        const lArm = new THREE.Mesh(armG, m); lArm.position.set(-5, 2, 2); lArm.rotation.z = 0.5; g.add(lArm);
        const rArm = new THREE.Mesh(armG, m); rArm.position.set(5, 2, 2); rArm.rotation.z = -0.5; g.add(rArm);
        const eyeG = new THREE.BoxGeometry(1.2, 1.2, 1); 
        g.add(new THREE.Mesh(eyeG, new THREE.MeshStandardMaterial({emissive:0xff0000, emissiveIntensity:2})).translateX(-1.8).translateY(8).translateZ(3.8)); 
        g.add(new THREE.Mesh(eyeG, new THREE.MeshStandardMaterial({emissive:0xff0000, emissiveIntensity:2})).translateX(1.8).translateY(8).translateZ(3.8)); 
        return applyShadows(g); 
    }
    function mkEmu() { 
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x553322, type: 'scales' }); 
        const body = new THREE.Mesh(new THREE.SphereGeometry(7, 8, 8), m); body.scale.set(1, 0.8, 1.3); g.add(body);
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 12, 6), m); neck.position.set(0, 8, 6); neck.rotation.x = -0.3; g.add(neck);
        const head = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), m); head.position.set(0, 14, 9); head.name = "head"; g.add(head);
        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.8, 4, 4), new THREE.MeshStandardMaterial({color:0x996633})); beak.position.set(0, 14, 12); beak.rotation.x = Math.PI/2; g.add(beak);
        const legG = new THREE.CylinderGeometry(0.5, 0.5, 10, 4);
        const lLeg = new THREE.Mesh(legG, m); lLeg.position.set(-3, -8, 0); g.add(lLeg);
        const rLeg = new THREE.Mesh(legG, m); rLeg.position.set(3, -8, 0); g.add(rLeg);
        return applyShadows(g); 
    }
    function mkMagpie() { 
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x111111, type: 'tech' }); 
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(3, 8, 4, 8), m); body.rotation.x = Math.PI/2; g.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(2.8, 8, 8), m); head.position.z = 6; head.name = "head"; g.add(head);
        const beak = new THREE.Mesh(new THREE.ConeGeometry(0.6, 3, 4), new THREE.MeshStandardMaterial({color:0x333333})); beak.position.set(0, 0, 8.5); beak.rotation.x = Math.PI/2; g.add(beak);
        const wingG = new THREE.BoxGeometry(12, 0.2, 6);
        const lWing = new THREE.Mesh(wingG, new THREE.MeshStandardMaterial({color:0xffffff})); lWing.position.set(-7, 0, 0); lWing.rotation.y = 0.2; g.add(lWing);
        const rWing = new THREE.Mesh(wingG, new THREE.MeshStandardMaterial({color:0xffffff})); rWing.position.set(7, 0, 0); rWing.rotation.y = -0.2; g.add(rWing);
        const tail = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 6), m); tail.position.z = -6; g.add(tail);
        return applyShadows(g); 
    }
    function mkSpider() { 
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x221133, type: 'vein' }); 
        const b1 = new THREE.Mesh(new THREE.SphereGeometry(4, 8, 8), m); b1.position.z = 3; b1.name = "head"; g.add(b1);
        const b2 = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), m); b2.position.z = -4; b2.scale.set(1, 0.8, 1.2); g.add(b2);
        for(let i=0; i<8; i++){ 
            const l = new THREE.Group(); 
            const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 8), m); s1.position.z = 4; l.add(s1);
            const s2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 10), new THREE.MeshStandardMaterial({emissive:0x00ffff})); s2.position.set(0, -4, 10); s2.rotation.x = Math.PI/3; l.add(s2);
            l.rotation.y = (i/8)*Math.PI*2; l.position.y = 2; g.add(l); 
        } 
        return applyShadows(g); 
    }
    function mkKangaroo() { 
        const g = new THREE.Group(); const m = getProceduralMaterial({ color: 0x884422, type: 'plasma' }); 
        const body = new THREE.Mesh(new THREE.CylinderGeometry(4, 6, 12, 8), m); g.add(body);
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2.5, 6, 6), m); neck.position.set(0, 8, 2); neck.rotation.x = -0.4; g.add(neck);
        const head = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 5), m); head.position.set(0, 11, 4); head.name = "head"; g.add(head);
        const tail = new THREE.Mesh(new THREE.CapsuleGeometry(1.5, 12, 4, 4), m); tail.position.set(0, -4, -6); tail.rotation.x = -Math.PI/4; g.add(tail);
        const legG = new THREE.CapsuleGeometry(2, 6, 4, 4);
        const lLeg = new THREE.Mesh(legG, m); lLeg.position.set(-5, -6, 0); g.add(lLeg);
        const rLeg = new THREE.Mesh(legG, m); rLeg.position.set(5, -6, 0); g.add(rLeg);
        const gloveG = new THREE.SphereGeometry(2.5, 8, 8);
        const lGlove = new THREE.Mesh(gloveG, new THREE.MeshStandardMaterial({color:0xff0000})); lGlove.position.set(-4, 4, 6); g.add(lGlove);
        const rGlove = new THREE.Mesh(gloveG, new THREE.MeshStandardMaterial({color:0xff0000})); rGlove.position.set(4, 4, 6); g.add(rGlove);
        return applyShadows(g); 
    }

    function mkForest() { for(let i=0; i<40; i++) { const tree = new THREE.Group(); tree.add(new THREE.Mesh(new THREE.BoxGeometry(2, 10, 2), new THREE.MeshStandardMaterial({color:0x442211}))); const f = new THREE.Mesh(new THREE.ConeGeometry(5, 15, 6), new THREE.MeshStandardMaterial({color:0x114411})); f.position.y = 10; tree.add(f); tree.position.set((Math.random()-0.5)*150, -10, -30 - Math.random()*80); scene.add(tree); env.push(applyShadows(tree)); } }
    function mkDesert() { for(let i=0; i<30; i++) { const r = new THREE.Mesh(new THREE.DodecahedronGeometry(5 + Math.random()*10, 0), new THREE.MeshStandardMaterial({color:0x884422})); r.position.set((Math.random()-0.5)*150, -15, -30 - Math.random()*80); r.rotation.set(Math.random(), Math.random(), Math.random()); scene.add(r); env.push(applyShadows(r)); } }
    function mkSuburbs() { for(let i=0; i<15; i++) { const h = new THREE.Group(); h.add(new THREE.Mesh(new THREE.BoxGeometry(15, 12, 15), new THREE.MeshStandardMaterial({color:0xeeeeee}))); const r = new THREE.Mesh(new THREE.ConeGeometry(12, 8, 4), new THREE.MeshStandardMaterial({color:0xaa2222})); r.position.y = 10; h.add(r); h.position.set((Math.random()-0.5)*160, -10, -40 - Math.random()*80); scene.add(h); env.push(applyShadows(h)); } }
    function mkShed() { for(let i=0; i<10; i++) { const b = new THREE.Mesh(new THREE.BoxGeometry(200, 2, 2), new THREE.MeshStandardMaterial({color:0x333333})); b.position.set(0, 30, -20 - i*15); scene.add(b); env.push(applyShadows(b)); } }
    function mkOutback() { mkDesert(); for(let i=0; i<15; i++) { const f = new THREE.Mesh(new THREE.BoxGeometry(1, 6, 1), new THREE.MeshStandardMaterial({color:0x332211})); f.position.set((Math.random()-0.5)*140, -12, -25 - Math.random()*40); scene.add(f); env.push(applyShadows(f)); } }

    const LVLS = [
        { n: "DROP BEAR", hp: 1000, create: mkDropBear, mkEnv: mkForest, bg: 0x050a05, story: "MISSION 1: THE HANGING TERROR\nDeep in the neon forest, a predator waits.\nStay alert. They come from above." },
        { n: "CYBER EMU", hp: 1500, create: mkEmu, mkEnv: mkDesert, bg: 0x0a0500, story: "MISSION 2: SPEED DEMON\nThe Great Emu War has evolved.\nFaster. Stronger. More feathers." },
        { n: "MAGPIE DRONE", hp: 2000, create: mkMagpie, mkEnv: mkSuburbs, bg: 0x05050a, story: "MISSION 3: SWOOP SEASON\nEyes in the back of your head won't save you.\nThe suburbs are no longer safe." },
        { n: "CYBER HUNTSMAN", hp: 2500, create: mkSpider, mkEnv: mkShed, bg: 0x0a000a, story: "MISSION 4: EIGHT-LEGGED FURY\nCaught in a web of lies and lasers.\nDon't let it get close." },
        { n: "K-9000 ROO", hp: 4000, create: mkKangaroo, mkEnv: mkOutback, bg: 0x0a0a00, story: "FINAL MISSION: THE BIG RED\nThe ultimate boxing champion.\nThis is for the championship belt." }
    ];

    const updateSize = () => {
        width = window.innerWidth; height = window.innerHeight;
        let vh = height * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
        camera.aspect = width / height; camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        uiCanvas.width = width; uiCanvas.height = height;
    };
    window.addEventListener('resize', updateSize);
    window.addEventListener('orientationchange', () => setTimeout(updateSize, 100));
    updateSize();

    function updateMouse(x, y) {
        const r = uiCanvas.getBoundingClientRect();
        mouse.x = ((x - r.left) / width) * 2 - 1;
        mouse.y = -((y - r.top) / height) * 2 + 1;
    }

    window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
    uiCanvas.addEventListener('mousedown', e => { 
        if(state==='input') handleKeyboardClick(e.clientX, e.clientY); 
        if(state==='playing'){ 
            if(e.button===0) isFiring = true; 
            if(e.button===2) dodge(); 
        } 
    });
    window.addEventListener('mouseup', e => { if(e.button===0) isFiring = false; });

    uiCanvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length > 1 && state === 'playing') dodge();
        const t = e.touches[0];
        updateMouse(t.clientX, t.clientY);
        if(state==='input') handleKeyboardClick(t.clientX, t.clientY);
        if(state==='playing') isFiring = true;
    }, { passive: false });
    uiCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        updateMouse(t.clientX, t.clientY);
    }, { passive: false });
    uiCanvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (e.touches.length === 0) isFiring = false;
    }, { passive: false });

    document.getElementById('shield-btn').addEventListener('touchstart', e => {
        e.preventDefault();
        dodge();
    }, { passive: false });
    document.getElementById('shield-btn').addEventListener('mousedown', e => {
        dodge();
    });

    window.addEventListener('blur', () => { if(state === 'playing') { prevState = state; state = 'paused'; isFiring = false; } });
    window.addEventListener('keydown', (e) => { 
        if(state === 'paused') { state = prevState; return; }
        if(e.code === 'Space' && state === 'playing') {
            e.preventDefault();
            dodge();
        }
    });
    uiCanvas.addEventListener('touchstart', () => { if(state === 'paused') state = prevState; });

    window.addEventListener('contextmenu', e => e.preventDefault());

    function handleKeyboardClick(mx, my) {
        const r = uiCanvas.getBoundingClientRect();
        const cx = mx - r.left, cy = my - r.top;
        const sz = Math.min(width / 13, height / 8, 45);
        const g = sz * 0.2;
        const sX = (width - (11 * (sz + g))) / 2;
        const sY = height * 0.55;
        
        KB_CHARS.forEach((char, i) => {
            const col = i % 10, row = Math.floor(i / 10);
            const x = sX + col * (sz + g), y = sY + row * (sz + g);
            if (cx > x && cx < x + sz && cy > y && cy < y + sz) {
                if (playerName.length < 3) playerName += char;
            }
        });

        const btnX = sX + 10 * (sz + g);
        if (cx > btnX && cx < btnX + sz * 2 && cy > sY && cy < sY + sz) {
            playerName = playerName.slice(0, -1);
        }
        if (cx > btnX && cx < btnX + sz * 2 && cy > sY + sz + g && cy < sY + sz * 2 + g && playerName.length === 3) {
            let lb = JSON.parse(localStorage.getItem('aussie_lb') || '[]');
            lb.push({ name: playerName, score });
            lb.sort((a, b) => b.score - a.score);
            localStorage.setItem('aussie_lb', JSON.stringify(lb.slice(0, 10)));
            showLeaderboard(score);
        }
    }

    function spawnP(pos, n, col) { for(let i=0; i<n; i++) { const m = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5), new THREE.MeshBasicMaterial({ color: col })); m.position.copy(pos); scene.add(m); particles.push({ m, v: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2), life: 30 }); } }

    function showScroller(text, callback) {
        state = 'scroller';
        document.getElementById('screen-msg').style.display = 'none';
        const container = document.getElementById('scroller-container');
        const content = document.getElementById('scroller-content');
        const skip = document.getElementById('skip-btn');
        container.style.display = 'block';
        skip.style.display = 'block';
        content.innerText = text;
        content.classList.remove('scroll-anim');
        void content.offsetWidth; // Force reflow
        content.classList.add('scroll-anim');

        const finish = () => {
            container.style.display = 'none';
            skip.style.display = 'none';
            content.classList.remove('scroll-anim');
            skip.onclick = null;
            container.onclick = null;
            callback();
        };
        skip.onclick = (e) => { e.stopPropagation(); finish(); };
        container.onclick = finish;
        // Listen for animation end as well
        content.onanimationend = finish;
    }

    function startGame() { 
        level=0; pHP=100; score=0; mult=1; 
        const introText = "A long time ago in an Outback far, far away...\n\nTHE NEON REBELLION\n\nThe Great Emu War has moved into the digital realm. The memes of old have become sentient programs, threatening to delete the human OS.\n\nAs the last Cyber-Operator, you must dive into the core and delete the Big Five before they upload the 'Bogans.exe' virus to the global network.\n\nYour journey begins in the Neon Forest...";
        showScroller(introText, startLevel);
    }
    function startLevel() {
        phase = 1;
        if(boss) scene.remove(boss); entities.forEach(e=>scene.remove(e.mesh)); entities=[]; env.forEach(e=>scene.remove(e)); env=[]; particles.forEach(p=>scene.remove(p.m)); particles=[]; ragdolls.forEach(r=>scene.remove(r.mesh)); ragdolls=[]; activeUniforms.length=0;
        const l=LVLS[level]; eHP=l.hp; eMax=l.hp; boss=l.create(); scene.add(boss);
        l.mkEnv(); scene.background=new THREE.Color(l.bg); scene.fog.color=new THREE.Color(l.bg);
        state='story'; timeScale=1.0; camTargetPos.set(0,5,80); document.getElementById('screen-msg').style.display='none';
        setTimeout(() => { state='intro'; camTargetPos.set(0,0,40); shake=15; }, 4000);
        setTimeout(() => { state='fight'; shake=5; }, 5500);
        setTimeout(() => { state='playing'; camTargetPos.set(0,0,50); }, 7000);
    }

    function fire() {
        if(state !== 'playing') return;
        playShootSound();
        const dmg=ctrl.w==='h'?70:35;
        const mx=(mouse.x+1)/2*width, my=(-mouse.y+1)/2*height;
        let hit=false, targetPoint = new THREE.Vector3();
        
        // 1. Check entities (projectiles and powerups) in screen space
        for(let i=0; i<entities.length; i++) {
            const ent = entities[i];
            const v = ent.mesh.position.clone().project(camera);
            const ex = (v.x+1)/2*width, ey = (-v.y+1)/2*height;
            if(Math.hypot(mx-ex, my-ey) < 40) {
                if(ent.type==='prj'){
                    ent.dead=true; spawnP(ent.mesh.position,12,0xffaa00); hit=true; score+=200;
                    playHitSound();
                } else {
                    ent.dead=true; if(ent.k==='hp') pHP=Math.min(100,pHP+45); else { ctrl.w='h'; ctrl.wt=400; }
                    spawnP(ent.mesh.position,20,0x00ffff); hit=true; score+=500;
                    playPowerupSound();
                }
                targetPoint.copy(ent.mesh.position);
                break;
            }
        }

        // 2. Check every mesh part of the boss in screen space
        if(!hit && boss) {
            boss.traverse(c => {
                if(hit || !c.isMesh) return;
                const v = new THREE.Vector3(); c.getWorldPosition(v);
                const proj = v.clone().project(camera);
                const bx = (proj.x+1)/2*width, by = (-proj.y+1)/2*height;
                if(Math.hypot(mx-bx, my-by) < 45) {
                    if(c.isArmor) {
                        playClankSound();
                        spawnP(v, 10, 0xffffff); // White sparks for armor
                        hit = true; 
                        targetPoint.copy(v);
                        mult = 1; // Hitting armor resets multiplier but counts as "hit" to not trigger miss logic? 
                        // Actually let's count it as a hit for the laser visual but reset mult.
                    } else {
                        eHP-=dmg; flash=5; shake=5; 
                        targetPoint.copy(v);
                        spawnP(targetPoint, 20, 0xffff00); hit=true; 
                        score+=100*mult; mult=Math.min(16,mult*2);
                        playHitSound();
                    }
                }
            });
        }

        // 3. Fallback for visual laser
        if(!hit) {
            mult=1;
            ray.setFromCamera(mouse, camera);
            targetPoint = ray.ray.at(100, new THREE.Vector3());
            const missSpark = ray.ray.at(75, new THREE.Vector3());
            spawnP(missSpark, 3, 0x444444);
        }

        const start = new THREE.Vector3(mouse.x*12, mouse.y*12, 38);
        const dist = start.distanceTo(targetPoint);
        const beamG = new THREE.CylinderGeometry(0.12, 0.12, dist, 4);
        const colors = [0x00ff00, 0xff0000, 0xff8800];
        const bCol = colors[Math.floor(Math.random()*colors.length)];
        const beamM = new THREE.MeshBasicMaterial({color:bCol, transparent:true, opacity:0.4});
        const beam = new THREE.Mesh(beamG, beamM);
        beam.position.copy(start.clone().lerp(targetPoint, 0.5));
        beam.lookAt(targetPoint);
        beam.rotateX(Math.PI/2);
        scene.add(beam);

        setTimeout(()=>{ scene.remove(beam); }, 50);
    }

    function dodge() { if(ctrl.cd<=0 && !ctrl.active){ ctrl.active=true; ctrl.activeTimer=120; camera.position.z=45; } }

    function update() {
        if(state === 'paused' || state === 'transforming') return;
        const now = Date.now();
        const t = now * 0.001; activeUniforms.forEach(u=>{ if(u.uTime) u.uTime.value=t; });
        if(state==='title'||state==='leaderboard'||state==='input') return;
        camera.position.lerp(camTargetPos, 0.05); camera.lookAt(0,0,-20);
        if(shake>0){ camera.position.x+=(Math.random()-0.5)*shake/4; camera.position.y+=(Math.random()-0.5)*shake/4; shake*=0.95; }
        if(boss){ boss.position.set(Math.sin(t*2)*18, Math.cos(t*1.2)*8, -25+Math.sin(t*0.5)*5); boss.rotation.set(Math.sin(t*0.5)*0.2, Math.PI + t*0.15, Math.sin(t)*0.1); bossSpot.target=boss; bossSpot.position.set(boss.position.x,50,boss.position.z); if(flash>0){ boss.traverse(c=>{if(c.isMesh)c.material.emissiveIntensity=5;}); flash--; } else { boss.traverse(c=>{if(c.isMesh)c.material.emissiveIntensity=1;}); } }
        env.forEach((obj,i)=>{ if(level===0||level===2) obj.rotation.z=Math.sin(t*2+i)*0.05; });
        if(state==='playing'){
            if(isFiring && now - lastFireTime > 250) { fire(); lastFireTime = now; }
            
            // Phase 2 Transformation trigger
            if(phase === 1 && eHP <= eMax / 3) {
                state = 'transforming';
                phase = 2;
                const armorMat = new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 1.0, roughness: 0.0, emissive: 0xffffff, emissiveIntensity: 0.5});
                
                // Identify parts to change (excluding head and existing armor)
                const parts = []; boss.traverse(c => { 
                    if(c.isMesh && !c.name.toLowerCase().includes('head')) parts.push(c); 
                });
                // Shuffle and pick 1/3
                for (let i = parts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [parts[i], parts[j]] = [parts[j], parts[i]];
                }
                const targets = parts.slice(0, Math.ceil(parts.length / 3));
                const maxArmor = targets.length;
                let armorCount = 0;

                const armSpot = new THREE.SpotLight(0xffffff, 5);
                armSpot.position.set(0, 50, 0);
                armSpot.angle = Math.PI / 8;
                armSpot.penumbra = 0.5;
                scene.add(armSpot);
                
                const attachArmor = () => {
                    if(!boss || armorCount >= maxArmor) { scene.remove(armSpot); state = 'playing'; return; }
                    
                    const targetPart = targets[armorCount];
                    const targetWPos = new THREE.Vector3();
                    targetPart.getWorldPosition(targetWPos);

                    const arm = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), armorMat);
                    const side = Math.random() > 0.5 ? 1 : -1;
                    arm.position.set(side * 100, (Math.random()-0.5)*40, -20);
                    scene.add(arm);
                    armSpot.target = arm;

                    const startPos = arm.position.clone();
                    const startTime = Date.now();
                    const duration = 250;

                    const moveArm = () => {
                        const elapsed = Date.now() - startTime;
                        const t = Math.min(1, elapsed / duration);
                        targetPart.getWorldPosition(targetWPos);
                        arm.position.lerpVectors(startPos, targetWPos, t);
                        arm.lookAt(targetWPos);

                        if(t < 1) {
                            requestAnimationFrame(moveArm);
                        } else {
                            playClankSound();
                            spawnP(targetWPos, 10, 0xffffff);
                            scene.remove(arm);
                            
                            // Transform the part into steel
                            targetPart.material = armorMat;
                            targetPart.isArmor = true;
                            
                            armorCount++;
                            if(armorCount < maxArmor) {
                                setTimeout(attachArmor, 100);
                            } else {
                                setTimeout(() => { 
                                    scene.remove(armSpot);
                                    state = 'playing'; 
                                }, 500);
                            }
                        }
                    };
                    moveArm();
                };

                const spinStart = now;
                const initialSpin = setInterval(() => {
                    if(!boss) { clearInterval(initialSpin); return; }
                    boss.rotation.y += 0.5;
                    if(Date.now() - spinStart > 800) {
                        clearInterval(initialSpin);
                        attachArmor();
                    }
                }, 16);
                return; 
            }

            if(Math.random()<0.012){ 
                const pr=new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,0), new THREE.MeshStandardMaterial({emissive:0xff00ff,emissiveIntensity:2})); 
                pr.position.copy(boss.position); scene.add(pr); entities.push({mesh:pr,type:'prj',dead:false}); 
            }
            if(Math.random()<0.005){ const k=Math.random()>0.6?'hp':'w'; const pw=new THREE.Mesh(new THREE.OctahedronGeometry(2.2), new THREE.MeshStandardMaterial({emissive:k==='hp'?0x00ff00:0x00ffff})); pw.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, -10); scene.add(pw); entities.push({mesh:pw,type:'pwr',k,life:240}); }
            if(eHP<=0){
                state='complete'; timeScale=0.2; camTargetPos.set(boss.position.x, boss.position.y, 30);
                playExplosionSound();
                const pieces = []; boss.traverse(c => { if(c.isMesh) pieces.push(c); });
                pieces.forEach(p => {
                    const wp = new THREE.Vector3(), wq = new THREE.Quaternion(); p.getWorldPosition(wp); p.getWorldQuaternion(wq);
                    scene.add(p); p.position.copy(wp); p.quaternion.copy(wq);
                    ragdolls.push({ mesh: p, v: new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2), rv: new THREE.Vector3(Math.random()*0.2, Math.random()*0.2, Math.random()*0.2) });
                });
                scene.remove(boss); boss = null;
                setTimeout(() => {
                    playExplosionSound();
                    ragdolls.forEach(r => { spawnConfetti(r.mesh.position, 20); scene.remove(r.mesh); });
                    ragdolls = []; timeScale=1.0;
                    if(level<LVLS.length-1){ 
                        level++; startLevel(); 
                    } else { 
                        const outroText = "MISSION ACCOMPLISHED\n\nThe Big Five have been deleted. The Outback Protocol is stable. You have successfully prevented the 'Bogans.exe' upload.\n\nBut in the digital shadows, something still lurks. Is the war truly over, or is this just Phase 1?\n\nFINAL SCORE: " + score + "\n\nPress SKIP to debrief.";
                        showScroller(outroText, () => { state='input'; playerName=""; });
                    }
                }, 2500);
            }
            if(pHP<=0){ state='input'; playerName=""; }
        }
        ragdolls.forEach(r => {
            r.v.y -= 0.01 * timeScale; r.mesh.position.add(r.v.clone().multiplyScalar(timeScale));
            r.mesh.rotation.x += r.rv.x * timeScale; r.mesh.rotation.y += r.rv.y * timeScale; r.mesh.rotation.z += r.rv.z * timeScale;
            if (r.mesh.position.y < -14.5) { r.mesh.position.y = -14.5; r.v.y *= -0.5; r.v.x *= 0.8; r.v.z *= 0.8; r.rv.multiplyScalar(0.9); }
        });
        if(ctrl.active) {
            ctrl.activeTimer--;
            if(ctrl.activeTimer <= 0) {
                ctrl.active = false;
                ctrl.cd = 120;
                camera.position.z = 50;
            }
        } else if(ctrl.cd > 0) {
            ctrl.cd--;
        }
        for(let i=entities.length-1; i>=0; i--){ const e=entities[i]; if(e.type==='prj'){ e.mesh.position.z+=0.25*timeScale; if(e.mesh.position.z>45){ if(!ctrl.active&&state==='playing'){ pHP-=8; shake=20; mult=1; } e.dead=true; } } else if(e.type==='pwr'){ e.mesh.rotation.y+=0.1*timeScale; e.life--; if(e.life<=0) e.dead=true; } if(e.dead){ scene.remove(e.mesh); entities.splice(i,1); } }
        for(let i=particles.length-1; i>=0; i--){ const p=particles[i]; p.m.position.add(p.v.clone().multiplyScalar(timeScale)); p.life--; p.m.scale.multiplyScalar(0.95); if(p.life<=0){ scene.remove(p.m); particles.splice(i,1); } }
        if(ctrl.wt>0){ ctrl.wt--; if(ctrl.wt<=0) ctrl.w='p'; }
    }

    function drawText(txt, x, y, size, color, align="center") {
        uiCtx.fillStyle = color;
        uiCtx.font = size + "px 'Press Start 2P'";
        uiCtx.textAlign = align;
        const words = txt.split(' '), lines = [];
        let line = '';
        const maxWidth = width * 0.85;
        words.forEach(w => {
            const test = line + w + ' ';
            if (uiCtx.measureText(test).width > maxWidth && line !== '') {
                lines.push(line); line = w + ' ';
            } else line = test;
        });
        lines.push(line);
        lines.forEach((l, i) => uiCtx.fillText(l, x, y + i * (size * 1.5)));
    }

    function render() {
        update(); renderer.render(scene, camera); uiCtx.clearRect(0,0,width,height);
        const info = document.getElementById('info-overlay'), container = document.getElementById('game-container'), sBtn = document.getElementById('shield-btn'), fsBtn = document.getElementById('fs-toggle');
        
        // Update Fullscreen Button
        if(state==='playing' || state==='paused' || state==='title' || state==='leaderboard' || state==='input') {
            fsBtn.style.display = 'block';
            fsBtn.innerText = document.fullscreenElement ? 'EXIT FULLSCREEN' : 'ENTER FULLSCREEN';
        } else {
            fsBtn.style.display = 'none';
        }

        if(state==='story'||state==='intro'||state==='fight') { info.style.display='block'; container.classList.add('cinematic'); sBtn.style.display='none'; } 
        else { 
            if(state==='playing') { 
                info.style.display='block'; sBtn.style.display='flex'; 
                sBtn.innerText = ''; // Indicator handles text
            } 
            else { info.style.display='none'; sBtn.style.display='none'; } 
            container.classList.remove('cinematic'); 
        }
        if(state==='playing'||state==='intro'||state==='story'||state==='fight'){
            const l=LVLS[level];
            if(state==='story'){ 
                uiCtx.fillStyle="rgba(0,0,0,0.7)"; uiCtx.fillRect(0,0,width,height); 
                const s = Math.min(width/40, 12);
                let curY = height/2 - (l.story.split('\n').length * s);
                l.story.split('\n').forEach(line => {
                    drawText(line, width/2, curY, s, "#fff");
                    curY += (s * 2.5); // extra space for wrapped lines
                });
            }
            else if(state==='intro'){ 
                drawText("WARNING: " + l.n, width/2, height/2, Math.min(width/20, 20), "#f04");
            }
            else if(state==='fight'){ 
                uiCtx.shadowBlur=20; uiCtx.shadowColor="#f0f";
                drawText("FIGHT FOR SURVIVAL", width/2, height/2, Math.min(width/15, 30), "#fff");
                uiCtx.shadowBlur=0; 
            }
            else {
                uiCtx.fillStyle="#fff"; uiCtx.textAlign="right"; uiCtx.font="12px 'Press Start 2P'"; uiCtx.fillText("SCORE: "+score,width-20,40); 
                
                // Multiplier with fire effect
                if(mult >= 16) {
                    uiCtx.shadowBlur = 15; uiCtx.shadowColor = "#f40";
                    uiCtx.fillStyle = "#ff0";
                    for(let i=0; i<3; i++) {
                        uiCtx.fillText("X"+mult, width-20 + (Math.random()-0.5)*10, 70 + (Math.random()-0.5)*10);
                    }
                    uiCtx.shadowBlur = 0;
                } else {
                    uiCtx.fillStyle = mult>1?"#0ff":"#fff";
                    uiCtx.fillText("X"+mult, width-20, 70);
                }

                uiCtx.fillStyle="#111"; uiCtx.fillRect(width/2-200,20,400,12); uiCtx.fillStyle="#0ff"; uiCtx.fillRect(width/2-200,20,400*(Math.max(0,eHP)/eMax),12); uiCtx.strokeStyle="#fff"; uiCtx.strokeRect(width/2-200,20,400,12); uiCtx.fillStyle="#fff"; uiCtx.font="10px 'Press Start 2P'"; uiCtx.textAlign="center"; uiCtx.fillText(l.n,width/2,15);
                
                uiCtx.textAlign="left"; uiCtx.fillStyle="#0f6"; uiCtx.fillText("HP: "+Math.floor(pHP),20,height-40); 
                
                // Circular Shield Indicator (aligned with bottom-right button 30px from edge + 40px radius = 70)
                const sx = width - 70, sy = height - 70, sr = 40;
                const pulse = state === 'playing' && !ctrl.active && ctrl.cd <= 0 ? Math.sin(Date.now()*0.01)*0.3 + 0.7 : 1;
                
                uiCtx.save();
                uiCtx.beginPath(); uiCtx.arc(sx, sy, sr, 0, Math.PI*2);
                uiCtx.strokeStyle = "rgba(255,255,255,0.1)"; uiCtx.lineWidth = 2; uiCtx.stroke();
                uiCtx.clip();

                let pct = 0, hue = 180; // 180 is Cyan/Blue, 0 is Red
                if(ctrl.active) {
                    pct = ctrl.activeTimer / 120;
                    hue = pct * 180;
                } else if(ctrl.cd > 0) {
                    pct = 1 - (ctrl.cd / 120);
                    hue = pct * 180;
                } else {
                    pct = 1; hue = 180;
                }

                uiCtx.fillStyle = `hsla(${hue}, 100%, 50%, ${ctrl.cd <= 0 && !ctrl.active ? pulse : 0.8})`;
                const fillHeight = sr * 2 * pct;
                uiCtx.fillRect(sx - sr, sy + sr - fillHeight, sr * 2, fillHeight);
                uiCtx.restore();

                // Border
                uiCtx.beginPath(); uiCtx.arc(sx, sy, sr, 0, Math.PI*2);
                uiCtx.strokeStyle = ctrl.active ? "#fff" : (ctrl.cd > 0 ? "#f55" : `rgba(0, 255, 255, ${pulse})`);
                uiCtx.lineWidth = 4;
                uiCtx.stroke();

                // Text
                uiCtx.fillStyle = "#fff"; uiCtx.font = "8px 'Press Start 2P'"; uiCtx.textAlign = "center";
                if(ctrl.active) uiCtx.fillText("ACTIVE", sx, sy+4);
                else if(ctrl.cd > 0) uiCtx.fillText(Math.ceil(ctrl.cd/60)+"s", sx, sy+4);
                else uiCtx.fillText("READY", sx, sy+4);
                
                uiCtx.lineWidth=1;
                
                const mx=(mouse.x+1)/2*width,my=(-mouse.y+1)/2*height; uiCtx.strokeStyle=ctrl.w==='h'?"#0ff":"#0f6"; uiCtx.beginPath(); uiCtx.arc(mx,my,25,0,Math.PI*2); uiCtx.moveTo(mx-35,my); uiCtx.lineTo(mx+35,my); uiCtx.moveTo(mx,my-35); uiCtx.lineTo(mx,my+35); uiCtx.stroke();
            }
        } else if(state==='input'){
            uiCtx.fillStyle="rgba(0,0,0,0.85)"; uiCtx.fillRect(0,0,width,height); uiCtx.fillStyle="#0ff"; uiCtx.textAlign="center"; 
            let f1 = Math.min(width/20, 20), f2 = Math.min(width/35, 12), f3 = Math.min(width/10, 40);
            uiCtx.font=f1+"px 'Press Start 2P'"; uiCtx.fillText("MISSION DEBRIEF",width/2,height*0.1);
            uiCtx.fillStyle="#fff"; uiCtx.font=f2+"px 'Press Start 2P'"; uiCtx.fillText("FINAL SCORE: " + score, width/2, height*0.18);
            uiCtx.font=(f2*0.8)+"px 'Press Start 2P'"; uiCtx.fillText("ENTER INITIALS",width/2,height*0.25);
            uiCtx.font=f3+"px 'Press Start 2P'"; uiCtx.fillText(playerName.padEnd(3,"_"),width/2,height*0.4);
            
            const sz = Math.min(width / 13, height / 8, 45);
            const g = sz * 0.2;
            const sX = (width - (11 * (sz + g))) / 2;
            const sY = height * 0.55;

            KB_CHARS.forEach((char,i)=>{ 
                const col=i%10,row=Math.floor(i/10); 
                const x=sX+col*(sz+g),y=sY+row*(sz+g); 
                uiCtx.fillStyle="#333"; uiCtx.fillRect(x,y,sz,sz); uiCtx.strokeStyle="#fff"; uiCtx.strokeRect(x,y,sz,sz); 
                uiCtx.fillStyle="#fff"; uiCtx.font=(sz*0.4)+"px 'Press Start 2P'"; uiCtx.fillText(char,x+sz/2,y+sz/2+sz*0.15); 
            });
            const btnX = sX+10*(sz+g);
            uiCtx.fillStyle="#500"; uiCtx.fillRect(btnX,sY,sz*2,sz); 
            uiCtx.fillStyle="#fff"; uiCtx.font=(sz*0.25)+"px 'Press Start 2P'"; uiCtx.fillText("DEL",btnX+sz,sY+sz/2+sz*0.1); 
            uiCtx.fillStyle=playerName.length===3?"#050":"#222"; uiCtx.fillRect(btnX,sY+sz+g,sz*2,sz); 
            uiCtx.fillStyle="#fff"; uiCtx.fillText("ENT",btnX+sz,sY+sz+g+sz/2+sz*0.1);
        } else if(state==='paused'){
            uiCtx.fillStyle="rgba(0,0,0,0.6)"; uiCtx.fillRect(0,0,width,height);
            uiCtx.fillStyle="#fff"; uiCtx.font="20px 'Press Start 2P'"; uiCtx.textAlign="center";
            uiCtx.fillText("PAUSED", width/2, height/2);
            uiCtx.font="10px 'Press Start 2P'";
            uiCtx.fillText("PRESS ANY KEY OR TAP TO RESUME", width/2, height/2 + 40);
        } else if(state==='transforming'){
            uiCtx.fillStyle="rgba(0,0,0,0.3)"; uiCtx.fillRect(0,0,width,height);
            drawText("PHASE 2: ARMORED", width/2, height/2, 24, "#0ff");
        }
        requestAnimationFrame(render);
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSfx(freq, type, duration, vol) {
        if (!isSoundOn || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playShootSound() { playSfx(440, 'square', 0.1, 0.1); }
    function playHitSound() { playSfx(150, 'sawtooth', 0.1, 0.1); }
    function playClankSound() { playSfx(800, 'square', 0.05, 0.15); }
    function playExplosionSound() { playSfx(100, 'sawtooth', 0.5, 0.2); }
    function playPowerupSound() { playSfx(880, 'sine', 0.3, 0.1); }

    let musicIndex = 0;
    const bassline = [55, 55, 65, 41, 41, 41, 49, 49]; // Simple frequencies
    function playMusicStep() {
        if (!isMusicOn || !audioCtx || state === 'paused' || state === 'scroller') return;
        const pitchScale = 1 + (level * 0.15);
        const freq = bassline[musicIndex % bassline.length] * pitchScale;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
        musicIndex++;
    }
    setInterval(playMusicStep, 250); // 120 BPM-ish

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    document.getElementById('fs-toggle').addEventListener('click', toggleFullscreen);
    document.getElementById('fs-toggle').addEventListener('touchstart', (e) => { e.preventDefault(); toggleFullscreen(); });

    function initInteraction() {
        const m=document.getElementById('screen-msg');
        m.style.display='flex';
        m.innerHTML=`<h1 style="color:#0ff; font-size:24px; text-shadow:2px 2px #f0f; text-align:center; margin-bottom:20px;">NEON BOSS RUSH 3D</h1>
                     <div style="display:flex; flex-direction:column; gap:15px; align-items:center;">
                         <button class="btn" id="fs-start-btn">START FULLSCREEN</button>
                         <button class="btn" style="background:#555; font-size:12px;" id="win-start-btn">START WINDOWED</button>
                     </div>`;
        
        const start = (fs) => { 
            initAudio();
            if (fs && document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            showTitle(); 
        };

        document.getElementById('fs-start-btn').addEventListener('click', () => start(true));
        document.getElementById('fs-start-btn').addEventListener('touchstart', (e) => { e.preventDefault(); start(true); });
        document.getElementById('win-start-btn').addEventListener('click', () => start(false));
        document.getElementById('win-start-btn').addEventListener('touchstart', (e) => { e.preventDefault(); start(false); });
    }

    initInteraction(); render();
</script>
</body>
